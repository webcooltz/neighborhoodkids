name: Deploy client to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
        with:
          enablement: true     # auto-create the Pages site if not enabled yet
      - uses: actions/upload-pages-artifact@v3
        with:
          path: src/client      # publish only the client folder as site root
      - id: deployment
        uses: actions/deploy-pages@v4
